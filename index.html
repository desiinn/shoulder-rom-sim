<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>肩可動域チェッカー試作</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

  <style>
    /* ===================================================
       CSS カスタムプロパティ（テーマ変数）
    =================================================== */
    :root {
      --bg:            #0c0f17;
      --surface:       #161b26;
      --surface-card:  #1e2533;
      --border:        #2b354a;
      --accent:        #00d4ff;
      --text-primary:  #f0f2f8;
      --text-muted:    #7685a6;
      --ok-color:      #00e676;
      --warn-color:    #ff3d3d;
      --overlay-warn:  rgba(255, 61, 61, 0.25);
      --font-display:  'Courier New', 'Lucida Console', monospace;
      --font-body:     'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      --radius:        12px;
    }

    /* ===== リセット & ベース ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-body);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ===== ヘッダー ===== */
    header {
      width: 100%;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }
    header .logo-mark {
      width: 32px; height: 32px;
      border: 2px solid var(--accent);
      border-radius: 6px;
      display: grid;
      place-items: center;
      font-size: 14px;
      color: var(--accent);
      font-family: var(--font-display);
      font-weight: bold;
    }
    header h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      line-height: 1.3;
    }
    header h1 span {
      display: block;
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 400;
    }
    .status-badge {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
    }
    .status-dot.active { background: var(--ok-color); box-shadow: 0 0 8px var(--ok-color); }
    .status-dot.warn   { background: var(--warn-color); box-shadow: 0 0 8px var(--warn-color); }

    /* ===== メインレイアウト ===== */
    main {
      flex: 1;
      width: 100%;
      max-width: 680px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ===== カメラ映像エリア ===== */
    .camera-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    #input-video {
      position: absolute;
      width: 1px; height: 1px;
      opacity: 0;
    }
    #output-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #alert-overlay {
      position: absolute;
      inset: 0;
      background: var(--overlay-warn);
      opacity: 0;
      transition: opacity 0.15s ease;
      pointer-events: none;
      box-shadow: inset 0 0 60px rgba(255,0,0,0.5);
    }
    #alert-overlay.active { opacity: 1; }

    .alert-banner {
      position: absolute;
      top: 14px; left: 50%;
      transform: translateX(-50%);
      background: var(--warn-color);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 8px 20px;
      border-radius: 30px;
      box-shadow: 0 4px 12px rgba(255,61,61,0.3);
      opacity: 0;
      transition: opacity 0.15s;
      white-space: nowrap;
      z-index: 5;
    }
    .alert-banner.active { opacity: 1; }

    #loading-msg {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--bg);
      color: var(--text-muted);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loading-msg.hidden { display: none; }

    /* ===== 情報・操作系パネル群 ===== */
    .panel-vertical {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
    }
    .metric-card .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
    }
    .metric-card .label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }
    .metric-card .unit {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* 左右の数値モニター */
    .angle-monitor-wrap {
      display: flex;
      justify-content: space-between;
      gap: 14px;
    }
    .angle-pane {
      flex: 1;
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 8px;
      text-align: center;
    }
    .angle-pane .pane-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
      font-weight: 600;
    }
    .angle-pane .value {
      font-family: var(--font-display);
      font-size: 64px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }
    /* 制限超過時に数値を赤くする */
    .angle-pane .value.over {
      color: var(--warn-color);
      text-shadow: 0 0 12px rgba(255, 61, 61, 0.3);
    }

    /* 操作設定エリア */
    .control-container {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 0;
    }
    .custom-slider {
      flex: 1;
      height: 14px;
      border-radius: 7px;
      outline: none;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .limit-num-input {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--accent);
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      width: 85px;
      height: 48px;
      text-align: center;
      outline: none;
    }

    /* ステータス表示 */
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface-card);
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin-top: 6px;
    }
    .status-text-large {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    /* ===== フッター ===== */
    footer {
      padding: 12px;
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
      width: 100%;
      background: var(--bg);
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">肩</div>
  <h1>
    肩可動域チェッカー
    <span>SHOULDER ROM SIMLATOR</span>
  </h1>
  <div class="status-badge">
    <div class="status-dot" id="pose-status-dot"></div>
    <span id="pose-status-text">初期化中...</span>
  </div>
</header>

<main>

  <div class="camera-wrapper">
    <video id="input-video" playsinline></video>
    <canvas id="output-canvas"></canvas>
    <div id="alert-overlay"></div>
    <div class="alert-banner" id="alert-banner">⚠ 可動域制限を超過しています</div>
    <div id="loading-msg">
      <div class="spinner"></div>
      <span>カメラ・姿勢推定を起動中...</span>
    </div>
  </div>

  <div class="panel-vertical">
    
    <div class="metric-card">
      <div class="card-header">
        <span class="label">現在の挙上角度</span>
        <span class="unit">度 (°)</span>
      </div>
      <div class="angle-monitor-wrap">
        <div class="angle-pane">
          <div class="pane-label">左腕</div>
          <div class="value" id="angle-display-left">---</div>
        </div>
        <div class="angle-pane">
          <div class="pane-label">右腕</div>
          <div class="value" id="angle-display-right">---</div>
        </div>
      </div>
    </div>

    <div class="metric-card">
      <div class="card-header">
        <span class="label">制限角度の設定 [30° - 150°]</span>
      </div>
      
      <div class="control-container">
        <input type="range" id="limit-slider" class="custom-slider" min="30" max="150" value="70" step="5">
        <input type="number" id="limit-input" class="limit-num-input" min="30" max="150" value="70" step="5">
      </div>

      <div class="status-row">
        <span class="label" style="border: none; margin: 0; padding: 0;">ステータス:</span>
        <div class="status-text-large" id="status-display">---</div>
      </div>
    </div>

  </div>

</main>

<footer>
  SHOULDER ROM SIMULATOR v0.5<br>
  Powered by Google MediaPipe Pose (Licensed under the Apache License, Version 2.0)
</footer>

<script src="script.js"></script>
</body>
</html>
